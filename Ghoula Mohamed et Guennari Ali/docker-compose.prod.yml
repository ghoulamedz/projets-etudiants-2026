version: '3.8'

# Production Docker Compose — pulls pre-built images from GHCR.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:

  mysql:
    image: mysql:8.0
    container_name: rayhan-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rayhan_erp_2024}
      MYSQL_DATABASE: rayhan_erp_db
      MYSQL_USER: rayhan_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rayhan_erp_2024}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - rayhan-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-ghoulamedz/rayhan}-backend:latest
    container_name: rayhan-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rayhan_erp_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Tunis
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-rayhan_erp_2024}
      RAYHAN_ERP_JWTSECRET: ${JWT_SECRET:?JWT_SECRET is required}
      RAYHAN_ERP_JWTEXPIRATIONMS: 86400000
    ports:
      - "8090:8080"
    networks:
      - rayhan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-ghoulamedz/rayhan}-frontend:latest
    container_name: rayhan-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3013:80"
    networks:
      - rayhan-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:

networks:
  rayhan-net:
    driver: bridge
